# Warehouse 物品配置说明
# 顶层字段：
# - version: 配置版本号，当前固定为 1
# - groups: 分组列表
#
# group 字段：
# - id: 分组唯一标识（用于 CSV 的 group_id）
# - name: 分组显示名（用于 CSV 的 group_name）
# - items: 该分组下的物品列表
#
# item 字段：
# - id: 物品唯一标识（用于 CSV 的 item_id）
# - name: 资源前缀（用于匹配 *_TEMPLATE / *_ICON 资产）
# - display_name: 日志/界面展示名称（不参与模板匹配）
# - scan: 是否参与扫描（false 表示跳过该物品）
# - scan_method: 识别方式
#     - direct: 在仓库格子内直接识别数量
#     - detail: 点击物品详情后识别数量
# - scan_page: 扫描页签
#     - consumable: 消耗品
#     - materials: 材料
#     - equipment: 装备
#     - collectibles: 收藏品
